<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Orders — MyStamp Dashboard</title>
<link rel="icon" href="IMAGES/mystamp-favicon-32x32.png" sizes="32x32" type="image/png">
<link rel="preload" href="FONTS/manrope-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="FONTS/inter-latin.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="fonts.css">
<style>
  :root{
    --bg:#f3f5fa; --card:#ffffff; --border:#e7ebf3; --text:#0b1830; --mute:#6b7590;
    --blue-deep:#001138; --blue-rich:#002e8a; --blue-bright:#0a47b5; --cyan:#6fc4ff;
    --green:#16a34a; --green-bg:#e9f9ee; --amber:#b45309; --amber-bg:#fef3c7; --red:#dc2626; --red-bg:#fee2e2;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
  h1,h2,.num,.ref{font-family:'Manrope',sans-serif;}

  /* ── Top bar ── */
  .topbar{
    background:linear-gradient(135deg,var(--blue-deep) 0%,var(--blue-rich) 55%,var(--blue-bright) 100%);
    color:#fff;padding:22px 28px;display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:14px;position:relative;overflow:hidden;
  }
  .topbar::before{
    content:'';position:absolute;inset:0;pointer-events:none;opacity:.5;
    background:radial-gradient(ellipse 60% 120% at 85% -20%, rgba(111,196,255,.25), transparent 60%);
  }
  .topbar-brand{display:flex;align-items:center;gap:16px;position:relative;z-index:1;}
  .topbar-logo{height:26px;width:auto;flex-shrink:0;display:block;}
  .topbar-divider{width:1px;height:28px;background:rgba(255,255,255,.25);flex-shrink:0;}
  .topbar h1{font-size:17px;margin:0;font-weight:800;letter-spacing:-.01em;}
  .topbar .sub{font-size:12px;opacity:.7;margin-top:1px;}
  .topbar-actions{display:flex;gap:10px;position:relative;z-index:1;}
  .btn{
    background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);
    padding:9px 16px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;transition:background .2s,transform .2s;
    font-family:'Inter',sans-serif;
  }
  .btn:hover{background:rgba(255,255,255,.2);transform:translateY(-1px);}
  .btn-primary{
    background:linear-gradient(135deg,var(--blue-rich),var(--blue-bright));color:#fff;border:none;
    box-shadow:0 8px 20px -6px rgba(0,46,138,.5);
  }

  .wrap{max-width:1180px;margin:0 auto;padding:26px 24px 60px;}

  /* ── Login gate ── */
  .gate{
    max-width:400px;margin:90px auto;background:#fff;border:1px solid var(--border);
    border-radius:22px;padding:36px 32px;text-align:center;
    box-shadow:0 30px 70px -30px rgba(0,20,60,.3);
  }
  .gate-icon{
    width:52px;height:52px;border-radius:14px;margin:0 auto 16px;
    background:linear-gradient(160deg,var(--blue-rich),var(--blue-bright));
    display:grid;place-items:center;box-shadow:0 10px 24px -6px rgba(0,46,138,.5);
  }
  .gate h2{margin:0 0 4px;font-size:18px;}
  .gate .muted{margin-bottom:18px;}
  .gate input{
    width:100%;padding:13px 15px;font-size:16px;border:1.5px solid var(--border);
    border-radius:12px;font-family:'Inter',sans-serif;transition:border-color .2s,box-shadow .2s;
  }
  .gate input:focus{outline:none;border-color:var(--blue-rich);box-shadow:0 0 0 3px rgba(0,46,138,.1);}
  .gate .btn-primary{width:100%;justify-content:center;margin-top:14px;padding:13px;font-size:14px;}
  .err{color:var(--red);font-size:13px;margin-top:10px;font-weight:600;}

  /* ── Stat cards ── */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
  .stat-card{
    background:#fff;border:1px solid var(--border);border-radius:var(--radius);
    padding:18px 20px;position:relative;overflow:hidden;
  }
  .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
  .stat-card.c1::before{background:linear-gradient(90deg,var(--blue-rich),var(--cyan));}
  .stat-card.c2::before{background:linear-gradient(90deg,#fbbf24,#f59e0b);}
  .stat-card.c3::before{background:linear-gradient(90deg,#22c55e,#16a34a);}
  .stat-card.c4::before{background:linear-gradient(90deg,var(--blue-deep),var(--blue-bright));}
  .stat-num{font-size:26px;font-weight:900;letter-spacing:-.02em;line-height:1;}
  .stat-label{font-size:12px;color:var(--mute);font-weight:600;margin-top:6px;}

  /* ── Toolbar ── */
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .search-wrap{flex:1;min-width:220px;position:relative;}
  .search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--mute);pointer-events:none;}
  .toolbar input[type="text"]{
    width:100%;padding:11px 14px 11px 40px;border:1.5px solid var(--border);border-radius:11px;
    font-size:14px;font-family:'Inter',sans-serif;background:#fff;transition:border-color .2s,box-shadow .2s;
  }
  .toolbar input[type="text"]:focus{outline:none;border-color:var(--blue-rich);box-shadow:0 0 0 3px rgba(0,46,138,.08);}
  .filter-pills{display:flex;gap:6px;}
  .pill{
    padding:8px 14px;border-radius:100px;font-size:12.5px;font-weight:700;cursor:pointer;
    border:1.5px solid var(--border);background:#fff;color:var(--mute);white-space:nowrap;
    transition:all .18s;
  }
  .pill.active{background:var(--blue-rich);border-color:var(--blue-rich);color:#fff;}

  /* ── Table ── */
  .table-card{
    background:#fff;border-radius:var(--radius);overflow:hidden;
    box-shadow:0 4px 24px rgba(0,20,60,.06);border:1px solid var(--border);
  }
  table{width:100%;border-collapse:collapse;}
  th{
    text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mute);
    padding:13px 16px;background:#f8fafc;border-bottom:1px solid var(--border);font-weight:700;
  }
  td{padding:15px 16px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  tbody tr{transition:background .15s;}
  tbody tr:hover{background:#fafbff;}
  .ref{font-weight:800;font-size:13px;letter-spacing:-.01em;}
  .pay-tag{font-size:11px;color:var(--mute);margin-top:2px;text-transform:capitalize;}
  .badge{
    display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:100px;
    font-size:11.5px;font-weight:700;text-transform:capitalize;
  }
  .badge::before{content:'';width:6px;height:6px;border-radius:50%;}
  .badge.pending{background:var(--amber-bg);color:var(--amber);}
  .badge.pending::before{background:var(--amber);}
  .badge.paid{background:var(--green-bg);color:var(--green);}
  .badge.paid::before{background:var(--green);}
  .badge.failed{background:var(--red-bg);color:var(--red);}
  .badge.failed::before{background:var(--red);}

  .avatar-row{display:flex;align-items:center;gap:10px;}
  .avatar{
    width:34px;height:34px;border-radius:10px;flex-shrink:0;
    background:linear-gradient(160deg,var(--blue-rich),var(--blue-bright));color:#fff;
    display:grid;place-items:center;font-weight:800;font-size:13px;font-family:'Manrope',sans-serif;
  }
  .cust-name{font-weight:700;}
  .cust-sub{color:var(--mute);font-size:12px;margin-top:1px;}

  .total-aed{font-weight:800;font-family:'Manrope',sans-serif;}

  .files-toggle{
    cursor:pointer;color:var(--blue-rich);font-weight:700;display:inline-flex;align-items:center;gap:5px;
    padding:5px 10px;background:#eef3ff;border-radius:8px;font-size:12px;
  }
  .files-toggle svg{transition:transform .2s;}
  .files-toggle.open svg{transform:rotate(180deg);}
  .files-list{display:none;margin:10px 0 0;padding:0;list-style:none;}
  .files-list.open{display:block;}
  .files-list li{margin-bottom:6px;}
  .files-list a{
    color:var(--blue-bright);text-decoration:none;font-size:12.5px;font-weight:600;
    display:inline-flex;align-items:center;gap:5px;
  }
  .files-list a:hover{text-decoration:underline;}
  .no-link{color:var(--mute);font-size:12px;}

  .muted{color:var(--mute);}
  .loading, .empty{text-align:center;padding:80px 20px;color:var(--mute);font-size:14px;}
  .refresh-note{font-size:11.5px;color:var(--mute);margin-top:14px;text-align:center;}

  @media (max-width:820px){
    .stats{grid-template-columns:repeat(2,1fr);}
    table, thead, tbody, tr{display:block;}
    thead{display:none;}
    tr{background:#fff;border-radius:14px;margin-bottom:12px;border:1px solid var(--border);padding:6px 0;}
    td{border-bottom:none;padding:8px 16px;display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
    td::before{content:attr(data-label);font-size:10.5px;text-transform:uppercase;color:var(--mute);font-weight:700;letter-spacing:.04em;flex-shrink:0;padding-top:2px;}
    .table-card{background:transparent;box-shadow:none;border:none;}
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-brand">
      <img class="topbar-logo" src="IMAGES/mystamp-company-stamp-dubai-footer-logo-white.webp" alt="MyStamp" width="140" height="29">
      <div class="topbar-divider"></div>
      <div>
        <h1>Orders Dashboard</h1>
        <div class="sub">Internal use only · not part of the public site</div>
      </div>
    </div>
    <div class="topbar-actions" id="topActions" style="display:none;">
      <button class="btn" onclick="loadOrders()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
    </div>
  </div>

  <div class="wrap">

    <div class="gate" id="gate">
      <div class="gate-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h2>Dashboard access</h2>
      <div class="muted">Enter the password you set as ADMIN_DASHBOARD_KEY</div>
      <input type="password" id="keyInput" placeholder="Password" onkeydown="if(event.key==='Enter')unlock()">
      <button class="btn btn-primary" onclick="unlock()">Unlock dashboard</button>
      <div class="err" id="gateErr"></div>
    </div>

    <div id="app" style="display:none;">

      <div class="stats">
        <div class="stat-card c1"><div class="stat-num" id="statTotal">–</div><div class="stat-label">Total orders</div></div>
        <div class="stat-card c2"><div class="stat-num" id="statPending">–</div><div class="stat-label">Pending</div></div>
        <div class="stat-card c3"><div class="stat-num" id="statPaid">–</div><div class="stat-label">Paid</div></div>
        <div class="stat-card c4"><div class="stat-num" id="statRevenue">–</div><div class="stat-label">Paid revenue (AED)</div></div>
      </div>

      <div class="toolbar">
        <div class="search-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search" placeholder="Search order ref, company, phone…" oninput="render()">
        </div>
        <div class="filter-pills" id="filterPills">
          <span class="pill active" data-f="all" onclick="setFilter('all')">All</span>
          <span class="pill" data-f="pending" onclick="setFilter('pending')">Pending</span>
          <span class="pill" data-f="paid" onclick="setFilter('paid')">Paid</span>
        </div>
      </div>

      <div class="table-card"><div id="content" class="loading">Loading orders…</div></div>
      <div class="refresh-note">Document links are valid for 1 hour — refresh the page to regenerate them.</div>
    </div>

  </div>

<script>
  var KEY_STORAGE = 'mystamp_admin_key';
  var allOrders = [];
  var currentFilter = 'all';

  function unlock() {
    var k = document.getElementById('keyInput').value.trim();
    if (!k) return;
    try { sessionStorage.setItem(KEY_STORAGE, k); } catch (e) {}
    loadOrders();
  }

  function getKey() {
    try { return sessionStorage.getItem(KEY_STORAGE) || ''; } catch (e) { return ''; }
  }

  function fmtDate(iso) {
    try {
      var d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }) + ' · ' +
             d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    } catch (e) { return iso || ''; }
  }

  function initials(name) {
    var s = (name || '?').trim();
    var parts = s.split(/\s+/).filter(Boolean);
    if (!parts.length) return '?';
    return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
  }

  function loadOrders() {
    var key = getKey();
    if (!key) return;
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('topActions').style.display = 'flex';
    document.getElementById('content').className = 'loading';
    document.getElementById('content').textContent = 'Loading orders…';

    fetch('/api/admin-orders?key=' + encodeURIComponent(key))
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, body: j }; }); })
      .then(function (res) {
        if (!res.ok || !res.body || !res.body.ok) {
          if (res.body && res.body.error === 'Unauthorized.') {
            try { sessionStorage.removeItem(KEY_STORAGE); } catch (e) {}
            document.getElementById('app').style.display = 'none';
            document.getElementById('topActions').style.display = 'none';
            document.getElementById('gate').style.display = 'block';
            document.getElementById('gateErr').textContent = 'Wrong password — try again.';
            return;
          }
          document.getElementById('content').className = 'empty';
          document.getElementById('content').textContent =
            'Could not load orders: ' + ((res.body && res.body.error) || 'unknown error');
          return;
        }
        allOrders = res.body.orders || [];
        updateStats();
        render();
      })
      .catch(function () {
        document.getElementById('content').className = 'empty';
        document.getElementById('content').textContent = 'Network error loading orders.';
      });
  }

  function updateStats() {
    var pending = allOrders.filter(function (o) { return o.status === 'pending'; }).length;
    var paid = allOrders.filter(function (o) { return o.status === 'paid'; });
    var revenue = paid.reduce(function (sum, o) { return sum + (Number(o.total_aed) || 0); }, 0);
    document.getElementById('statTotal').textContent = allOrders.length;
    document.getElementById('statPending').textContent = pending;
    document.getElementById('statPaid').textContent = paid.length;
    document.getElementById('statRevenue').textContent = revenue.toLocaleString('en-US');
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('#filterPills .pill').forEach(function (p) {
      p.classList.toggle('active', p.dataset.f === f);
    });
    render();
  }

  function statusClass(s) {
    if (s === 'paid') return 'paid';
    if (s === 'failed' || s === 'declined' || s === 'cancelled') return 'failed';
    return 'pending';
  }

  function kindLabel(k) {
    return { license: 'Emirates ID / License', logo: 'Logo', design: 'Design', 'customer-design': 'Customer design', signature: 'Signature' }[k] || 'File';
  }

  function render() {
    var q = (document.getElementById('search').value || '').toLowerCase().trim();
    var rows = allOrders.filter(function (o) {
      if (currentFilter !== 'all' && o.status !== currentFilter) return false;
      if (!q) return true;
      return [o.order_ref, o.company, o.customer_name, o.customer_phone, o.customer_email]
        .filter(Boolean).join(' ').toLowerCase().indexOf(q) !== -1;
    });

    var content = document.getElementById('content');
    if (!rows.length) {
      content.className = 'empty';
      content.textContent = allOrders.length ? 'No orders match your filters.' : 'No orders yet.';
      return;
    }
    content.className = '';

    var html = '<table><thead><tr>' +
      '<th>Order</th><th>Status</th><th>Company / Customer</th><th>Stamp</th><th>Total</th><th>Files</th><th>Date</th>' +
      '</tr></thead><tbody>';

    rows.forEach(function (o, i) {
      var docs = Array.isArray(o.documents) ? o.documents : [];
      var stamp = (o.shape || '') + (o.size ? ' · ' + o.size : '') + (o.quantity ? ' × ' + o.quantity : '');
      var custLabel = o.company || o.customer_name || 'Unknown';
      html += '<tr>' +
        '<td data-label="Order"><span class="ref">' + escapeHtml(o.order_ref || '') + '</span><div class="pay-tag">' + escapeHtml(o.pay_method || '—') + '</div></td>' +
        '<td data-label="Status"><span class="badge ' + statusClass(o.status) + '">' + escapeHtml(o.status || '') + '</span></td>' +
        '<td data-label="Customer"><div class="avatar-row"><div class="avatar">' + initials(custLabel) + '</div><div>' +
          '<div class="cust-name">' + escapeHtml(custLabel) + '</div>' +
          (o.customer_name && o.company ? '<div class="cust-sub">' + escapeHtml(o.customer_name) + '</div>' : '') +
          (o.customer_phone ? '<div class="cust-sub">' + escapeHtml(o.customer_phone) + '</div>' : '') +
        '</div></div></td>' +
        '<td data-label="Stamp">' + escapeHtml(stamp || '—') + '</td>' +
        '<td data-label="Total"><span class="total-aed">AED ' + escapeHtml(String(o.total_aed != null ? o.total_aed : '—')) + '</span></td>' +
        '<td data-label="Files">' + renderFiles(docs, i) + '</td>' +
        '<td data-label="Date" class="muted">' + fmtDate(o.created_at) + '</td>' +
        '</tr>';
    });

    html += '</tbody></table>';
    content.innerHTML = html;
  }

  function renderFiles(docs, i) {
    if (!docs.length) return '<span class="muted" style="font-size:12px;">0 files</span>';
    var id = 'files-' + i;
    var items = docs.map(function (d) {
      var label = kindLabel(d.kind) + (d.name ? ' — ' + d.name : '');
      return d.url
        ? '<li><a href="' + d.url + '" target="_blank" rel="noopener">' +
            '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>' +
            escapeHtml(label) + '</a></li>'
        : '<li class="no-link">' + escapeHtml(label) + ' (no link)</li>';
    }).join('');
    return '<span class="files-toggle" id="toggle-' + id + '" onclick="toggleFiles(\'' + id + '\')">' +
      '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>' +
      docs.length + ' file' + (docs.length > 1 ? 's' : '') + '</span>' +
      '<ul class="files-list" id="' + id + '">' + items + '</ul>';
  }

  function toggleFiles(id) {
    var el = document.getElementById(id);
    var toggle = document.getElementById('toggle-' + id);
    if (el) el.classList.toggle('open');
    if (toggle) toggle.classList.toggle('open');
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  (function init() {
    var k = getKey();
    if (k) { loadOrders(); }
  })();
</script>

</body>
</html>
