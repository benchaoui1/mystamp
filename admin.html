<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Orders — Internal Dashboard</title>
<link rel="icon" href="IMAGES/mystamp-favicon-32x32.png" sizes="32x32" type="image/png">
<style>
  :root{
    --bg:#0b1830; --card:#ffffff; --border:#e5e9f2; --text:#0b1830; --mute:#64748b;
    --blue:#002e8a; --blue2:#0a47b5; --green:#16a34a; --amber:#d97706; --red:#dc2626;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,'Inter',sans-serif;background:#f4f6fb;color:var(--text);}
  .topbar{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
  .topbar h1{font-size:18px;margin:0;font-weight:800;}
  .topbar .sub{font-size:12px;opacity:.75;}
  .wrap{max-width:1100px;margin:0 auto;padding:20px;}
  .gate{max-width:380px;margin:80px auto;background:#fff;border:1px solid var(--border);border-radius:16px;padding:28px;text-align:center;box-shadow:0 20px 50px -20px rgba(0,20,60,.25);}
  .gate input{width:100%;padding:12px 14px;font-size:16px;border:1.5px solid var(--border);border-radius:10px;margin:14px 0;}
  .gate button, .toolbar button{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:none;padding:11px 18px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
  .toolbar input[type="text"]{flex:1;min-width:180px;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;}
  .err{color:var(--red);font-size:13px;margin-top:8px;}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(0,20,60,.06);}
  th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--mute);padding:12px 14px;background:#f8fafc;border-bottom:1px solid var(--border);}
  td{padding:13px 14px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:top;}
  tr:last-child td{border-bottom:none;}
  .ref{font-weight:800;font-family:monospace;}
  .badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11.5px;font-weight:700;}
  .badge.pending{background:#fef3c7;color:var(--amber);}
  .badge.paid{background:#dcfce7;color:var(--green);}
  .badge.failed{background:#fee2e2;color:var(--red);}
  .files-toggle{cursor:pointer;color:var(--blue);font-weight:700;text-decoration:underline dotted;}
  .files-list{display:none;margin-top:8px;padding-left:0;list-style:none;}
  .files-list.open{display:block;}
  .files-list li{margin-bottom:5px;}
  .files-list a{color:var(--blue2);text-decoration:none;font-size:12.5px;}
  .files-list a:hover{text-decoration:underline;}
  .muted{color:var(--mute);font-size:12px;}
  .loading, .empty{text-align:center;padding:60px 20px;color:var(--mute);}
  .refresh-note{font-size:11.5px;color:var(--mute);margin-top:10px;}
</style>
</head>
<body>

  <div class="topbar">
    <div>
      <h1>MyStamp — Orders Dashboard</h1>
      <div class="sub">Internal use only · not part of the public site</div>
    </div>
    <div id="topActions" style="display:none;">
      <button onclick="loadOrders()">↻ Refresh</button>
    </div>
  </div>

  <div class="wrap">

    <div class="gate" id="gate">
      <div style="font-weight:800;margin-bottom:4px;">Enter dashboard password</div>
      <div class="muted">This matches ADMIN_DASHBOARD_KEY in Vercel</div>
      <input type="password" id="keyInput" placeholder="Password">
      <button onclick="unlock()">Unlock</button>
      <div class="err" id="gateErr"></div>
    </div>

    <div id="app" style="display:none;">
      <div class="toolbar">
        <input type="text" id="search" placeholder="Search order ref, company, phone…" oninput="render()">
      </div>
      <div id="content" class="loading">Loading orders…</div>
      <div class="refresh-note">Document links are valid for 1 hour, then refresh the page to regenerate them.</div>
    </div>

  </div>

<script>
  var KEY_STORAGE = 'mystamp_admin_key';
  var allOrders = [];

  function unlock() {
    var k = document.getElementById('keyInput').value.trim();
    if (!k) return;
    try { sessionStorage.setItem(KEY_STORAGE, k); } catch (e) {}
    loadOrders();
  }

  function getKey() {
    try { return sessionStorage.getItem(KEY_STORAGE) || ''; } catch (e) { return ''; }
  }

  function fmtDate(iso) {
    try {
      var d = new Date(iso);
      return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }) + ' ' +
             d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    } catch (e) { return iso || ''; }
  }

  function loadOrders() {
    var key = getKey();
    if (!key) return;
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('topActions').style.display = 'block';
    document.getElementById('content').className = 'loading';
    document.getElementById('content').textContent = 'Loading orders…';

    fetch('/api/admin-orders?key=' + encodeURIComponent(key))
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, body: j }; }); })
      .then(function (res) {
        if (!res.ok || !res.body || !res.body.ok) {
          if (res.body && res.body.error === 'Unauthorized.') {
            try { sessionStorage.removeItem(KEY_STORAGE); } catch (e) {}
            document.getElementById('app').style.display = 'none';
            document.getElementById('topActions').style.display = 'none';
            document.getElementById('gate').style.display = 'block';
            document.getElementById('gateErr').textContent = 'Wrong password.';
            return;
          }
          document.getElementById('content').className = 'empty';
          document.getElementById('content').textContent =
            'Could not load orders: ' + ((res.body && res.body.error) || 'unknown error');
          return;
        }
        allOrders = res.body.orders || [];
        render();
      })
      .catch(function () {
        document.getElementById('content').className = 'empty';
        document.getElementById('content').textContent = 'Network error loading orders.';
      });
  }

  function statusClass(s) {
    if (s === 'paid') return 'paid';
    if (s === 'failed' || s === 'declined' || s === 'cancelled') return 'failed';
    return 'pending';
  }

  function kindLabel(k) {
    return { license: 'Emirates ID / License', logo: 'Logo', design: 'Design', 'customer-design': 'Customer design', signature: 'Signature' }[k] || 'File';
  }

  function render() {
    var q = (document.getElementById('search').value || '').toLowerCase().trim();
    var rows = allOrders.filter(function (o) {
      if (!q) return true;
      return [o.order_ref, o.company, o.customer_name, o.customer_phone, o.customer_email]
        .filter(Boolean).join(' ').toLowerCase().indexOf(q) !== -1;
    });

    var content = document.getElementById('content');
    if (!rows.length) {
      content.className = 'empty';
      content.textContent = allOrders.length ? 'No orders match your search.' : 'No orders yet.';
      return;
    }
    content.className = '';

    var html = '<table><thead><tr>' +
      '<th>Order</th><th>Status</th><th>Company / Customer</th><th>Stamp</th><th>Total</th><th>Files</th><th>Date</th>' +
      '</tr></thead><tbody>';

    rows.forEach(function (o, i) {
      var docs = Array.isArray(o.documents) ? o.documents : [];
      var stamp = (o.shape || '') + (o.size ? ' · ' + o.size : '') + (o.quantity ? ' × ' + o.quantity : '');
      html += '<tr>' +
        '<td class="ref">' + escapeHtml(o.order_ref || '') + '<div class="muted">' + escapeHtml(o.pay_method || '') + '</div></td>' +
        '<td><span class="badge ' + statusClass(o.status) + '">' + escapeHtml(o.status || '') + '</span></td>' +
        '<td>' + escapeHtml(o.company || o.customer_name || '—') +
          (o.customer_name && o.company ? '<div class="muted">' + escapeHtml(o.customer_name) + '</div>' : '') +
          (o.customer_phone ? '<div class="muted">' + escapeHtml(o.customer_phone) + '</div>' : '') +
        '</td>' +
        '<td>' + escapeHtml(stamp || '—') + '</td>' +
        '<td>AED ' + escapeHtml(String(o.total_aed != null ? o.total_aed : '—')) + '</td>' +
        '<td>' + renderFiles(docs, i) + '</td>' +
        '<td class="muted">' + fmtDate(o.created_at) + '</td>' +
        '</tr>';
    });

    html += '</tbody></table>';
    content.innerHTML = html;
  }

  function renderFiles(docs, i) {
    if (!docs.length) return '<span class="muted">0 files</span>';
    var id = 'files-' + i;
    var items = docs.map(function (d) {
      var label = kindLabel(d.kind) + (d.name ? ' — ' + d.name : '');
      return d.url
        ? '<li><a href="' + d.url + '" target="_blank" rel="noopener">' + escapeHtml(label) + '</a></li>'
        : '<li class="muted">' + escapeHtml(label) + ' (no link)</li>';
    }).join('');
    return '<span class="files-toggle" onclick="toggleFiles(\'' + id + '\')">' + docs.length + ' file' + (docs.length > 1 ? 's' : '') + '</span>' +
      '<ul class="files-list" id="' + id + '">' + items + '</ul>';
  }

  function toggleFiles(id) {
    var el = document.getElementById(id);
    if (el) el.classList.toggle('open');
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // Auto-unlock if we already have a key from this session
  (function init() {
    var k = getKey();
    if (k) { loadOrders(); }
  })();
</script>

</body>
</html>
